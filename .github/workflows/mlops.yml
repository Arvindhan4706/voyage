name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f ml/requirements.txt ]; then pip install -r ml/requirements.txt; fi

    - name: Train Baseline Model & Log Metrics
      run: |
        cd ml
        python generate_data.py
        python train.py

    - name: Run Unit & API Tests
      run: |
        cd ml
        python -m pytest test_ml.py

    - name: Build Docker Image
      run: |
        cd ml
        docker build -t voyage-ai-mlops:latest .

    - name: Run Model Monitor
      run: |
        cd ml
        python monitor.py
